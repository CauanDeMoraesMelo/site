<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROQUE’S PARFUN</title>
    <style> 
    :root{
        --rosa: #F8ACE7;
        --preto: #000000c4 ;
        --cor-de-fundo:var(--preto)
    }
    
    *{
        margin: 0;
        padding: 0;
    }
    
    .loja{
        background-image: linear-gradient(black,#f8ace7);
    }
    .roque{
        font-size: 96px;
        color: var(--rosa);
    font-family: "Cinzel", serif;
      font-optical-sizing: auto;
      font-weight: weight;
      font-style: normal;
      padding-left: 10%;
    }
    .comeso{
        display: flex;
        background-image: linear-gradient(black,#66666623);
    }
    .sacola{
        width: 50px;
        height: 50px;
        padding-left: 9%;
        padding-top: 5%;
    }
    .corasao{
        width: 40px;
        height: 40px;
        padding-left: 5%;
        padding-top: 5%;
    }
    .search-box{
    position: absolute;
    left: 40%;
    background:none;
    height: 40px;
    padding: 10px;
    border-radius: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.search-txt{
    border: 20px;
border: var(--rosa);
background: none;
outline: #F8ACE7;
color: #f0f5fb;
font-size: 16px;
line-height: 20px;
width: 0;
transition: .5s;
font-family: "Poppins", sans-serif;
}
.search-btn{
    height: 40px;
    width: 40px;
    border-radius: 50%;
    background:none;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: .5s;
}
.search-box:hover > .search-txt{
    width: 240px;
    padding: 0 6px;
    background: none;
}
::-webkit-input-placeholder{
    color: var(--rosa);
}
.tudo{
    display: flex;
}
.parametro{
    background-color: var(--fundo-texto);
    border: 2px solid var(--branco);
    margin-top: 32px;
    padding: 24px;
}
.parametro-coluna__senha{
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.parametro-senha{
    width: 50%;
    margin: 0 auto;
}

.parametro-senha-botoes{
    display: flex;
    justify-content: center;
}

.parametro-senha__botao{
    background-color: var(--fundo-texto);
    color: var(--branco);
    border: 2px solid var(--branco);
    padding: 24px;
    font-size: 24px;
    cursor: pointer;
}
.u{

    justify-content: space-around;
    text-align: center;
}
.o{
    display: flex;
}
    </style>
</head>
<body>
    <section class="loja">
    <header class="cabesa">
<div class="comeso">
                <h1 class="roque">ROQUE’S PARFUN</h1>
                <img src="Sacola.svg" alt="carrinho" class="sacola">
                <img src="Favoritos.svg" alt="compra" class="corasao">
</div>
<div class="tudo">
    <img src="logo.svg" alt="logo">
    <div class="search-box">
        <a href="#" class="search-btn"><img src="lupa.svg" alt="lupa" height="20" width="20" class="lupa"></a>
        <input type="text" placeholder="pesquisa..." class="search-txt"> 
    </div>
</div>
<section class="o">
<img src="sapato.svg" alt="imagem-do-goodgirl-perfume" class="u">
<h1 class="text1">Carolina</h1>
<h2 class="text2">Perfume</h2>
<h1 class="text3">R$</h1>
<h2 class="text4">ou</h2>
<h1 class="text5">Quantidade</h1>
<div class="parametro">
            <div class="parametro-senha-botoes">
                <button class="parametro-senha__botao">-</button>
                <p class="parametro-senha__texto">1</p>
                <button class="parametro-senha__botao">+</button>
            </div>
        </div> 
        <button type="button"> <img src="Sacola.svg" alt="adicionar a comopra"></button>
    </section>
       
</body>
<script src="js.js"></script>
</html>
